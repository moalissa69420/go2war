<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Portal — Go To War</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="portal">
    <aside class="portal-index">
      <div class="portal-index-title">GO TO WAR</div>
      <div class="portal-index-meta">Client Portal (password required)</div>
      <ul>
        <li>
          <a href="troll/" data-client="troll" data-dest="troll/">
            <span class="num">01.</span> Troll
          </a>
        </li>
      </ul>

      <div style="margin-top:1.5rem; padding-top:0.75rem; border-top:1px solid var(--border); font-size:0.8rem; color:var(--muted);">
        <a href="../">Back to home</a>
      </div>
    </aside>

    <main class="portal-content">
      <div class="title">Client Portal</div>
      <div class="subtitle">Select a client on the left. You’ll be prompted for a password.</div>
      <div class="subtitle">Notes + markup are shared between you and the client.</div>
    </main>
  </div>

  <script src="../app/portal.js"></script>
</body>
</html>
