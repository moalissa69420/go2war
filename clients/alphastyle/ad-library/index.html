<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AlphaStyle — Ad Library</title>
  <link rel="stylesheet" href="../../../styles.css" />
</head>
<body>
  <div class="page">
    <div class="site-title">GO TO WAR</div>
    <div class="subtitle">AlphaStyle — Ad Library</div>
    <div class="meta">Add creative into <code>assets/clients/alphastyle/ad-library/</code> then select + annotate here.</div>

    <div class="toolbar" role="toolbar" aria-label="Annotation tools">
      <span style="color:var(--muted); margin-right:6px;">Tool</span>
      <button type="button" data-tool="select" class="active">Select</button>
      <button type="button" data-tool="circle">Circle</button>
      <button type="button" data-tool="rect">Highlight</button>
      <button type="button" data-tool="note">Note</button>
      <button type="button" data-action="undo">Undo</button>
      <button type="button" data-action="delete">Delete</button>
      <button type="button" data-action="save">Save</button>
      <span id="status" style="margin-left:auto; color:var(--muted); font-size:0.85rem;"></span>
    </div>

    <section id="asset_01">
      <div class="viewer" id="viewer">
        <img
          class="viewer-media"
          id="media"
          alt="Ad creative"
          src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%221200%22%20height%3D%22700%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23ffffff%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22Times%20New%20Roman%22%20font-size%3D%2218%22%20fill%3D%22%23000%22%3EAlphaStyle%20Ad%20Library%20%E2%80%94%20add%20assets%20to%20assets/clients/alphastyle/ad-library%3C/text%3E%3C/svg%3E"
        />
        <canvas class="viewer-canvas" id="canvas"></canvas>
      </div>

      <div class="notes" id="notes">
        <div class="meta" style="margin-bottom:0.35rem;">Notes</div>
        <div id="noteList"></div>
      </div>
    </section>

    <section style="margin-top:1.25rem;">
      <div class="meta" style="margin-bottom:0.35rem;">Gallery</div>
      <div class="asset-grid" id="assetGrid">
        <div class="asset-card">
          <div class="meta">No images found yet.</div>
          <div class="meta">Put JPG/PNG/GIF/WEBP into:</div>
          <div class="meta"><code>assets/clients/alphastyle/ad-library/</code></div>
        </div>
      </div>
    </section>

    <div class="meta" style="margin-top:1.25rem;"><a href="../">Back</a></div>
  </div>

  <script>
    window.GTW_CLIENT = "alphastyle";
    window.GTW_ASSET_ID = "adlib_01";
  </script>
  <script src="../../../app/annotate.js"></script>
</body>
</html>
