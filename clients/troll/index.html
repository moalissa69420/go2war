<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Troll — Client Board</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body>
  <div class="portal">
    <aside class="portal-index">
      <div class="portal-index-title">Troll</div>
      <div class="portal-index-meta">Shared review board</div>
      <ul>
        <li><a href="../" style="color:var(--muted);"><span class="num">←</span> Back</a></li>
        <li style="margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--border);">
          <a href="#asset_01" data-asset="asset_01"><span class="num">01.</span> Brand Guidelines Cover</a>
        </li>
      </ul>
      <div style="margin-top:1.25rem; font-size:0.75rem; color:var(--muted);">
        Tip: draw circle/box, then add a note.
      </div>
    </aside>

    <main class="portal-content">
      <div class="title">Troll</div>
      <div class="subtitle">Password-gated. Markup + notes are shared.</div>

      <div class="toolbar" role="toolbar" aria-label="Annotation tools">
        <span style="color:var(--muted); margin-right:6px;">Tool:</span>
        <button type="button" data-tool="select" class="active">Select</button>
        <button type="button" data-tool="circle">Circle</button>
        <button type="button" data-tool="rect">Highlight</button>
        <button type="button" data-tool="note">Note</button>
        <button type="button" data-action="undo">Undo</button>
        <button type="button" data-action="delete">Delete</button>
        <button type="button" data-action="save">Save</button>
        <span id="status" style="margin-left:auto; color:var(--muted); font-size:0.85rem;"></span>
      </div>

      <section id="asset_01">
        <div class="viewer" id="viewer">
          <img class="viewer-media" id="media" alt="Asset" src="../../troll_bg/assets/logos/primary-logo.png" />
          <canvas class="viewer-canvas" id="canvas"></canvas>
        </div>

        <div class="notes" id="notes">
          <div class="subtitle" style="margin-bottom:0.35rem;">Notes</div>
          <div id="noteList"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.GTW_CLIENT = "troll";
    window.GTW_ASSET_ID = "asset_01";
  </script>
  <script src="../../app/annotate.js"></script>
</body>
</html>
