<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

  .logo{font-size:13px;font-weight:700;letter-spacing:.32em;color:#fff}
  .pad{padding:50px 44px 14px;text-align:center}
  .ey{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#B8935A;margin-bottom:18px;font-weight:700}
  .h1{font-family:'Arial Black','Helvetica',Arial,sans-serif;font-size:42px;font-weight:900;line-height:1.05;letter-spacing:.005em;text-transform:uppercase;color:#fff;margin-bottom:22px}

  .codelbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:12px}
  .code{font-family:'Arial Black','Helvetica',Arial,sans-serif;font-size:42px;font-weight:900;letter-spacing:.14em;color:#B8935A;line-height:1}
  .codenote{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-top:14px}
  .small{font-size:13px;color:#999;font-style:italic;margin-bottom:24px}
  .cta-wrap{text-align:center;padding:6px 0 40px}
  .cta{display:inline-block;background:#fff;color:#0A0A0A;font-family:'Arial Black','Helvetica',Arial,sans-serif;font-size:13px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;padding:18px 50px}

  @media(max-width:520px){
    .pad{padding:36px 26px 10px}
    .h1{font-size:32px}
    .code{font-size:34px}
}
